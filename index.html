<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MJ Enterprises Ltd</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f2f2f2;
}
<link rel="manifest" href="manifest.json">
.header{
background:#0b8f4d;
padding:15px;
color:white;
text-align:center;
}

.box{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#0b8f4d;
border:none;
color:white;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="header">
<h2>MJ Enterprises Ltd</h2>
<p>Clearing & Management System</p>
</div>

<div class="box" id="loginBox">

<h3>Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Default login:</p>
<p>Username: admin</p>
<p>Password: 1234</p>

</div>

<div id="app" class="hidden">

<div class="box">
<h3>Dashboard</h3>

<p>Total Trucks:
<span id="count">0</span>
</p>

</div>

<div class="box">

<h3>Add Truck</h3>

<input id="truckNo"
placeholder="Truck Number">

<input id="client"
placeholder="Client Name">

<select id="status">
<option>Pending</option>
<option>Released</option>
</select>

<button onclick="saveTruck()">
Save Truck
</button>

</div>

<div class="box">

<h3>Truck Records</h3>

<table>

<thead>
<tr>
<th>Truck</th>
<th>Client</th>
<th>Status</th>
</tr>
</thead>

<tbody id="records">
</tbody>

</table>

</div>

</div>

<script>

let trucks=
JSON.parse(localStorage.getItem("mjtrucks"))||[];

function login(){

let u=
document.getElementById("user").value;

let p=
document.getElementById("pass").value;

if(u=="admin"&&p=="1234"){

document.getElementById(
"loginBox"
).style.display="none";

document.getElementById(
"app"
).classList.remove(
"hidden"
);

loadData();

}else{

alert("Wrong login");

}

}

function saveTruck(){

let truck={

number:
document.getElementById("truckNo").value,

client:
document.getElementById("client").value,

status:
document.getElementById("status").value

};

trucks.push(truck);

localStorage.setItem(
"mjtrucks",
JSON.stringify(trucks)
);

loadData();

}

function loadData(){

document.getElementById(
"count"
).innerText=
trucks.length;

let rows="";

trucks.forEach(t=>{

rows+=`
<tr>
<td>${t.number}</td>
<td>${t.client}</td>
<td>${t.status}</td>
</tr>
`;

});

document.getElementById(
"records"
).innerHTML=rows;

}

</script>

</body>
</html>
